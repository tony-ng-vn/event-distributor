name: Check-in

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: check-in-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-gates:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Production build
        run: npm run build
        env:
          # Build only validates types/routes; Clerk/InsForge are runtime env vars.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder

  integration:
    name: Integration tests (InsForge)
    runs-on: ubuntu-latest
    needs: deploy-gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: npm run test:integration
        env:
          INSFORGE_URL: ${{ secrets.INSFORGE_URL }}
          INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
          NEXT_PUBLIC_INSFORGE_URL: ${{ secrets.INSFORGE_URL }}
        continue-on-error: true
